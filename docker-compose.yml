services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: hackathon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hackathon"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - hackathon-postgres:/var/lib/postgresql/data

volumes:
  hackathon-postgres:
